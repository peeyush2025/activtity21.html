<!DOCTYPE html>
<html>
    <head>
        <title>my animal fact file</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color:darkgreen;
            } 
                .fact-file {
                    background-color: lightyellow;
                    color: darkslategray;
                    padding: 25px;
                    width: 260px;
                    border:4px solid forestgreen;
                    margin: 30px;
                }
                .animal-name {
                    font-size: 22px;
                    color: forestgreen;
                }
                .details{
                    color: darkslategray;

                }
                .cool-fact {
                    color: darkorange;
                    font-style: italic;
                }



</style>
    </head>
    <body>
        <div class="fact-file">
            <h1 class="animal-name">Snow leopard</h1>
            <p class="details">Type: big cat</p>
            <p class="details">lives in the mountains of Central Asia</p>
            <p class="details">Diet:deer.goats and wild animals</p>
            <p class="cool-fact">Cool fact: Can leap up to 15 metres in one jump</p>
        </div>
    </body>
    

        

</html>
